<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1422"/>
      <stop offset="100%" stop-color="#04080f"/>
    </linearGradient>
    <radialGradient id="root-glow" cx="75%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#1556a5" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#1556a5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)"/>
  <rect width="600" height="340" fill="url(#root-glow)"/>

  <!-- Branching tree from right -->
  <g stroke="rgba(21,86,165,0.45)" stroke-width="0.7" fill="none">
    <!-- Root to L1 -->
    <line x1="450" y1="170" x2="370" y2="100"/>
    <line x1="450" y1="170" x2="370" y2="170"/>
    <line x1="450" y1="170" x2="370" y2="240"/>
    <!-- L1 to L2 -->
    <line x1="370" y1="100" x2="290" y2="60"/>
    <line x1="370" y1="100" x2="290" y2="120"/>
    <line x1="370" y1="170" x2="290" y2="160"/>
    <line x1="370" y1="170" x2="290" y2="195"/>
    <line x1="370" y1="240" x2="290" y2="220"/>
    <line x1="370" y1="240" x2="290" y2="280"/>
    <!-- L2 to L3 -->
    <line x1="290" y1="60" x2="220" y2="40"/>
    <line x1="290" y1="60" x2="220" y2="80"/>
    <line x1="290" y1="195" x2="220" y2="180"/>
    <line x1="290" y1="195" x2="220" y2="215"/>
    <line x1="290" y1="280" x2="220" y2="295"/>
  </g>

  <!-- Nodes -->
  <g>
    <!-- Root -->
    <circle cx="450" cy="170" r="9" fill="rgba(21,86,165,0.18)"/>
    <circle cx="450" cy="170" r="4" fill="#1556a5"/>

    <!-- L1 -->
    <g fill="#ffffff">
      <circle cx="370" cy="100" r="3"/>
      <circle cx="370" cy="170" r="3"/>
      <circle cx="370" cy="240" r="3"/>
    </g>

    <!-- L2 (smaller) -->
    <g fill="rgba(255,255,255,0.6)">
      <circle cx="290" cy="60" r="2"/>
      <circle cx="290" cy="120" r="2"/>
      <circle cx="290" cy="160" r="2"/>
      <circle cx="290" cy="195" r="2"/>
      <circle cx="290" cy="220" r="2"/>
      <circle cx="290" cy="280" r="2"/>
    </g>

    <!-- L3 (smallest) -->
    <g fill="rgba(255,255,255,0.4)">
      <circle cx="220" cy="40" r="1.5"/>
      <circle cx="220" cy="80" r="1.5"/>
      <circle cx="220" cy="180" r="1.5"/>
      <circle cx="220" cy="215" r="1.5"/>
      <circle cx="220" cy="295" r="1.5"/>
    </g>
  </g>

  <!-- Title -->
  <text x="40" y="170" font-family="'Cormorant Garamond', Georgia, serif" font-size="44" fill="#ffffff" font-weight="400" letter-spacing="1">SuperMindMap</text>
  <text x="40" y="200" font-family="'Fragment Mono', monospace" font-size="11" fill="rgba(255,255,255,0.55)" letter-spacing="3">思考の構造可視化 AI</text>

  <!-- Mono tags -->
  <text x="40" y="40" font-family="'Fragment Mono', monospace" font-size="10" fill="rgba(255,255,255,0.45)" letter-spacing="2">ID:SUPERMINDMAP</text>
  <text x="560" y="324" font-family="'Fragment Mono', monospace" font-size="10" fill="rgba(255,255,255,0.35)" letter-spacing="2" text-anchor="end">AI PRODUCT / R&amp;D</text>
</svg>
