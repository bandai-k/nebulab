<svg viewBox="0 0 480 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1422"/>
      <stop offset="100%" stop-color="#04080f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#1556a5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1556a5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="silhouette" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>
  <rect width="480" height="600" fill="url(#bg)"/>
  <rect width="480" height="600" fill="url(#glow)"/>

  <!-- Faint horizon / Narita line -->
  <line x1="0" y1="380" x2="480" y2="380" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
  <g stroke="rgba(255,255,255,0.12)" stroke-width="0.5">
    <line x1="0" y1="400" x2="480" y2="400"/>
    <line x1="0" y1="420" x2="480" y2="420"/>
    <line x1="0" y1="440" x2="480" y2="440"/>
  </g>

  <!-- Tiny stars above -->
  <g fill="rgba(255,255,255,0.5)">
    <circle cx="80" cy="70" r="0.8"/>
    <circle cx="140" cy="50" r="1"/>
    <circle cx="200" cy="80" r="0.7"/>
    <circle cx="380" cy="40" r="1"/>
    <circle cx="420" cy="80" r="0.8"/>
    <circle cx="60" cy="150" r="0.7"/>
    <circle cx="430" cy="160" r="0.9"/>
  </g>

  <!-- Portrait silhouette: head + shoulders, soft and abstract -->
  <g fill="url(#silhouette)" stroke="rgba(255,255,255,0.4)" stroke-width="0.7">
    <!-- Shoulders -->
    <path d="M 100 600 L 100 480 Q 100 410 240 380 Q 380 410 380 480 L 380 600 Z"/>
    <!-- Head -->
    <ellipse cx="240" cy="290" rx="78" ry="92"/>
  </g>

  <!-- Subtle face contour line -->
  <path d="M 162 290 Q 240 230 318 290" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>

  <!-- Soft outline glow ring -->
  <circle cx="240" cy="290" r="100" fill="none" stroke="rgba(21,86,165,0.3)" stroke-width="0.5"/>

  <!-- Mono caption -->
  <text x="40" y="40" font-family="'Fragment Mono', monospace" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="3">CEO / 代表社員</text>
  <text x="40" y="565" font-family="'Cormorant Garamond', Georgia, serif" font-size="28" fill="rgba(255,255,255,0.9)" font-weight="400" letter-spacing="1">萬代 晃生</text>
  <text x="42" y="585" font-family="'Fragment Mono', monospace" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="3">BANDAI KOKI / NARITA, JP</text>
</svg>
